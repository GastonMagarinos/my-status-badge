name: Update Status Badge
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Status
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo '{"schemaVersion": 1, "label": "Status", "message": "online", "color": "brightgreen"}' > status.json
          else
            echo '{"schemaVersion": 1, "label": "Status", "message": "offline", "color": "red"}' > status.json
          fi

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add status.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update status badge" && git push)
