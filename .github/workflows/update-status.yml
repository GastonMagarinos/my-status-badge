name: Update Status Badge
on:
  push:
    branches: [ main ]
  workflow_dispatch:      # Esto te asegura el botón manual
  schedule:
    - cron: '*/30 * * * *'

# AQUÍ ESTÁ EL TRUCO: Le damos permiso explícito de escritura al token de la Action
permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Usamos el event_name para saber si fue un push (online) o cron/manual (offline)
      - name: Set Status
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo '{"schemaVersion": 1, "label": "Status", "message": "online", "color": "brightgreen", "style": "flat"}' > status.json
          else
            echo '{"schemaVersion": 1, "label": "Status", "message": "offline", "color": "red", "style": "flat"}' > status.json
          fi

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add status.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update status badge" && git push)
